name: eBay Market Watch Cron Sync

on:
  schedule:
    # 每小时整点运行一次
    - cron: "0 * * * *"
  # 允许手动触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cron-sync
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_URL }}/api/external/cron-sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SYNC_SECRET }}" \
            -w "\nHTTP %{http_code}" \
            -f
