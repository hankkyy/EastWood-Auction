name: eBay Market Watch Cron Sync

on:
  schedule:
    # 每 5 分钟触发一次（UTC 时间）
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger eBay sync
        run: |
          curl -X POST "${{ vars.PROD_URL || 'https://east-wood-auction.vercel.app' }}/api/external/cron-sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SYNC_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n" \
            -f
