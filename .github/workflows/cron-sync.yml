name: eBay Market Watch Cron Sync

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger eBay sync
        run: |
          if [ -z "${{ secrets.CRON_SYNC_SECRET }}" ]; then
            echo "::error::CRON_SYNC_SECRET is empty or not set"
            exit 1
          fi

          curl -s --max-time 90 -X POST "https://eastwoodauction.vercel.app/api/external/cron-sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SYNC_SECRET }}" \
            -H "Content-Type: application/json" \
            -w "\n%{http_code}" \
            -o /tmp/cron-sync-response.json

          HTTP_CODE=$(tail -1 /tmp/cron-sync-response.json)
          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Sync failed with HTTP $HTTP_CODE"
            cat /tmp/cron-sync-response.json
            exit 1
          fi

          echo "Sync response:"
          head -n -1 /tmp/cron-sync-response.json | python3 -m json.tool 2>/dev/null || head -n -1 /tmp/cron-sync-response.json
